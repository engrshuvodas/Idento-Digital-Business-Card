<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Engr Shuvo Das – Freelancer at Fiverr. Connect via this digital business card: email, WhatsApp, location, and social links." />
  <title>Engr Shuvo Das | Digital Business Card</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Manrope + Playfair Display -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ANIMATED BACKGROUND: CSS Blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- WebGL/Canvas particle layer -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Mouse-follow glow -->
  <div class="mouse-glow" id="mouseGlow" aria-hidden="true"></div>

  <!-- BOKEH BACKGROUND IMAGE -->
  <div class="bg-image-wrap" aria-hidden="true">
    <img
      src="https://lh3.googleusercontent.com/aida/AP1WRLuV5P6lBWCjxDEase1BoL8txrkKHK2wD6JLREa6zEhIAwxac-P-ByBbcEeXgDPQZv7zzWXorpKK9sC-3-N0y9pl4xmRK5ZKGgygD_RSJStmrS299LMSEPckMps6LNc-l7iIDb_XUz5yomZwbQyA_q3PHmQQyCIop3DP6EMBga9PK2EASM1CRWJrkkMeYROFYHFGbRyowq_1gsPjB9qpHLBgulN47hhAep67U_Bt-FBl_HCDPS5Z0cosuA"
      alt="" class="bg-image" />
    <div class="bg-overlay"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="card-wrapper" role="main">
    <article class="glass-card" aria-label="Engr Shuvo Das Digital Business Card">

      <!-- ── Floating Share Button (top-right corner) ─────── -->
      <button class="share-fab" id="btn-share" aria-label="Share this card" title="Share">
        <span class="material-symbols-outlined" aria-hidden="true">share</span>
      </button>

      <!-- Profile Section -->
      <header class="profile-section">
        <div class="avatar-ring">
          <img
            src="./Shuvo Pro.png"
            alt="Engr Shuvo Das professional headshot" class="avatar-img" loading="eager" />
        </div>
        <div class="profile-info">
          <h1 class="profile-name">Engr Shuvo Das</h1>
          <p class="profile-title">Freelancer | Fiverr</p>
        </div>
      </header>

      <!-- ── Save Contact CTA ──────────────────────────────── -->
      <button class="save-contact-btn" id="btn-save-contact" aria-label="Save Engr Shuvo Das to contacts">
        <span class="material-symbols-outlined" aria-hidden="true">person_add</span>
        Save Contact
      </button>

      <!-- Action Buttons -->
      <nav class="actions-list" aria-label="Contact actions">

        <a href="https://www.instagram.com/engrshuvo74886/" target="_blank" rel="noopener noreferrer" class="action-btn"
          id="btn-follow" aria-label="Follow Shuvo on Instagram">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">person_add</span>
          </span>
          <span class="action-text">
            <span class="action-label">Follow me</span>
            <span class="action-sub">@engrshuvo74886</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="mailto:engrshuvoda@gmail.com" class="action-btn" id="btn-email" aria-label="Send Shuvo an email">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">mail</span>
          </span>
          <span class="action-text">
            <span class="action-label">Email me</span>
            <span class="action-sub">engrshuvoda@gmail.com</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="https://maps.app.goo.gl/9TnqmrrwfwZEkH7EA" target="_blank" rel="noopener noreferrer"
          class="action-btn" id="btn-office" aria-label="View Shuvo's location on Google Maps">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">location_on</span>
          </span>
          <span class="action-text">
            <span class="action-label">Visit My location</span>
            <span class="action-sub">Gujarat, India</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="https://wa.me/+919641700503" target="_blank" rel="noopener noreferrer" class="action-btn" id="btn-call" aria-label="WhatsApp Shuvo at +91 96417 00503">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">call</span>
          </span>
          <span class="action-text">
            <span class="action-label">WhatsApp me</span>
            <span class="action-sub">+91 96417 00503</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="https://linkedin.com/in/engrshuvoda" target="_blank" rel="noopener noreferrer" class="action-btn"
          id="btn-linkedin" aria-label="Connect with Shuvo on LinkedIn">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">share</span>
          </span>
          <span class="action-text">
            <span class="action-label">Follow my LinkedIn</span>
            <span class="action-sub">engrshuvoda</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>
      </nav>

      <!-- Signature Divider -->
      <div class="sig-divider" aria-hidden="true">
        <div class="sig-line"></div>
        <span class="material-symbols-outlined sig-icon">eco</span>
        <div class="sig-line"></div>
      </div>

    </article>
  </main>

  <!-- Grain overlay for tactile depth -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Main script -->
  <script src="script.js"></script>
</body>

</html>
