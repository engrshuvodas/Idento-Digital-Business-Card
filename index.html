<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mike Gilson – Manager at BioPharm Company. Connect via this digital business card: email, call, office location, and social links." />
  <title>Mike Gilson | Digital Business Card</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Manrope + Playfair Display -->
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet"
  />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ANIMATED BACKGROUND: CSS Blobs -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- WebGL/Canvas particle layer -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Mouse-follow glow -->
  <div class="mouse-glow" id="mouseGlow" aria-hidden="true"></div>

  <!-- BOKEH BACKGROUND IMAGE -->
  <div class="bg-image-wrap" aria-hidden="true">
    <img
      src="https://lh3.googleusercontent.com/aida/AP1WRLuV5P6lBWCjxDEase1BoL8txrkKHK2wD6JLREa6zEhIAwxac-P-ByBbcEeXgDPQZv7zzWXorpKK9sC-3-N0y9pl4xmRK5ZKGgygD_RSJStmrS299LMSEPckMps6LNc-l7iIDb_XUz5yomZwbQyA_q3PHmQQyCIop3DP6EMBga9PK2EASM1CRWJrkkMeYROFYHFGbRyowq_1gsPjB9qpHLBgulN47hhAep67U_Bt-FBl_HCDPS5Z0cosuA"
      alt=""
      class="bg-image"
    />
    <div class="bg-overlay"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="card-wrapper" role="main">
    <article class="glass-card" aria-label="Mike Gilson Digital Business Card">

      <!-- Profile Section -->
      <header class="profile-section">
        <div class="avatar-ring">
          <img
            src="https://lh3.googleusercontent.com/aida/AP1WRLuRcNBL4UqicMRXDSsXwZhVPuCPj04calPJbA2j6fK1dWp_gYYY4c6kvyj-fMLQ6INAbYdK9Mr8MEiUJuyexrOM-V6Ckf2MIpZNUXcazGx6tZ4nmGFKfEZCqgh_9P3TztGOg3fjWP1yRaYDK0jZFmQi8J5YsJZFU1Tqw0LdjNMaoqzrnRy5BrgwNXJNFFX9MLLMfAQHVt-PTWX0BGPtHSMF1-HTicrrzFxTh9UP29jg3Q64NUu9TUsRfFc"
            alt="Mike Gilson professional headshot"
            class="avatar-img"
            loading="eager"
          />
        </div>
        <div class="profile-info">
          <h1 class="profile-name">Mike Gilson</h1>
          <p class="profile-title">Manager | BioPharm Company</p>
        </div>
      </header>

      <!-- Action Buttons -->
      <nav class="actions-list" aria-label="Contact actions">

        <a href="https://instagram.com/mike.gilson" target="_blank" rel="noopener noreferrer"
          class="action-btn" id="btn-follow" aria-label="Follow Mike on social media">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">person_add</span>
          </span>
          <span class="action-text">
            <span class="action-label">Follow me</span>
            <span class="action-sub">@mike.gilson</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="mailto:mike.gilson@gmail.com" class="action-btn" id="btn-email"
          aria-label="Send Mike an email">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">mail</span>
          </span>
          <span class="action-text">
            <span class="action-label">Email me</span>
            <span class="action-sub">mike.gilson@gmail.com</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="https://maps.google.com/?q=2003+Philadelphia+Pike" target="_blank"
          rel="noopener noreferrer" class="action-btn" id="btn-office"
          aria-label="Get directions to Mike's office">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">location_on</span>
          </span>
          <span class="action-text">
            <span class="action-label">Visit my office</span>
            <span class="action-sub">2003 Philadelphia Pike...</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="tel:+12124567890" class="action-btn" id="btn-call"
          aria-label="Call Mike at +1-212-456-7890">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">call</span>
          </span>
          <span class="action-text">
            <span class="action-label">Call me</span>
            <span class="action-sub">+1-212-456-7890</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>

        <a href="https://linkedin.com/in/mike-gilson" target="_blank" rel="noopener noreferrer"
          class="action-btn" id="btn-linkedin" aria-label="Connect with Mike on LinkedIn">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined">share</span>
          </span>
          <span class="action-text">
            <span class="action-label">Follow my LinkedIn</span>
            <span class="action-sub">mike.gilson</span>
          </span>
          <span class="action-arrow material-symbols-outlined" aria-hidden="true">north_east</span>
        </a>
      </nav>

      <!-- Signature Divider -->
      <div class="sig-divider" aria-hidden="true">
        <div class="sig-line"></div>
        <span class="material-symbols-outlined sig-icon">eco</span>
        <div class="sig-line"></div>
      </div>

    </article>
  </main>

  <!-- Grain overlay for tactile depth -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Main script -->
  <script src="script.js"></script>
</body>
</html>
