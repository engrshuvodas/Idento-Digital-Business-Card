<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Engr Shuvo Das – Freelancer at Fiverr. Connect via this digital business card: email, WhatsApp, location, and social links." />
  <title>Engr Shuvo Das | Rose Glass Theme</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Playfair Display (Serif for elegance) & Manrope (Sans for readability) -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />

  <!-- Material Symbols Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- Animated Bubble Canvas -->
  <canvas id="bubble-canvas" aria-hidden="true"></canvas>

  <main class="card-wrapper" role="main">
    <article class="glass-card" aria-label="Engr Shuvo Das Digital Business Card">

      <!-- ── Floating Share Button (top-right corner) ─────── -->
      <button class="share-fab" id="btn-share" aria-label="Share this card" title="Share">
        <span class="material-symbols-outlined" aria-hidden="true">ios_share</span>
      </button>

      <!-- Profile Section -->
      <header class="profile-section">
        <div class="avatar-ring">
          <img src="assets/images/client.jpg" alt="Engr Shuvo Das professional headshot" class="avatar-img" loading="eager" />
        </div>
        <div class="profile-info">
          <h1 class="profile-name">Engr Shuvo Das</h1>
          <p class="profile-title">Freelancer | <span class="highlight">Fiverr</span></p>
        </div>
      </header>

      <!-- Save Contact CTA -->
      <button class="save-contact-btn" id="btn-save-contact" aria-label="Save Engr Shuvo Das to contacts">
        Save Contact
      </button>

      <!-- Action Buttons -->
      <nav class="actions-list" aria-label="Contact actions">

        <a href="https://wa.me/919641700503" target="_blank" rel="noopener noreferrer" class="action-btn" id="btn-call" aria-label="WhatsApp Shuvo at +91 96417 00503">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined icon-rose">call</span>
          </span>
          <span class="action-text">
            <span class="action-label">Call me</span>
            <span class="action-sub">+91 96417 00503</span>
          </span>
        </a>

        <a href="https://www.instagram.com/engrshuvo74886/" target="_blank" rel="noopener noreferrer" class="action-btn" id="btn-follow" aria-label="Follow Shuvo on Instagram">
          <span class="action-icon-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--color-rose)"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          </span>
          <span class="action-text">
            <span class="action-label">Follow me</span>
            <span class="action-sub">@engrshuvo74886</span>
          </span>
        </a>

        <a href="https://maps.app.goo.gl/9TnqmrrwfwZEkH7EA" target="_blank" rel="noopener noreferrer" class="action-btn" id="btn-office" aria-label="View Shuvo's location on Google Maps">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined icon-rose">location_on</span>
          </span>
          <span class="action-text">
            <span class="action-label">Visit my office</span>
            <span class="action-sub">Gujarat, India</span>
          </span>
        </a>

        <a href="mailto:engrshuvoda@gmail.com" class="action-btn" id="btn-email" aria-label="Send Shuvo an email">
          <span class="action-icon-wrap" aria-hidden="true">
            <span class="material-symbols-outlined icon-rose">mail</span>
          </span>
          <span class="action-text">
            <span class="action-label">Email me</span>
            <span class="action-sub">engrshuvoda@gmail.com</span>
          </span>
        </a>

        <a href="https://linkedin.com/in/engrshuvoda" target="_blank" rel="noopener noreferrer" class="action-btn" id="btn-linkedin" aria-label="Connect with Shuvo on LinkedIn">
          <span class="action-icon-wrap" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="var(--color-rose)"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          </span>
          <span class="action-text">
            <span class="action-label">Follow my LinkedIn</span>
            <span class="action-sub">engrshuvoda</span>
          </span>
        </a>

      </nav>

    </article>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Main script -->
  <script src="assets/js/script.js"></script>
</body>
</html>
